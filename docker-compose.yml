services:
  dev:
    image: node:22-alpine
    # container_name: master-thesis-dev
    working_dir: /app
    command: sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then npm ci; fi && npm run dev -- --host 0.0.0.0 --port 2346"
    ports:
      - "2346:2346"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    restart: unless-stopped
    # networks:
    #   - sit-net
    # healthcheck:
    #   test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080 || exit 1"]
    #   interval: 10s
    #   timeout: 3s
    #   retries: 30
    #   start_period: 180s

volumes:
  node_modules:

